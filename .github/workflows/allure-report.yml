name: 📊 Allure Report

on:
  # Run after nightly workflow completes
  workflow_run:
    workflows: ["🌙 Nightly Full Suite"]
    types:
      - completed

  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-report:
    name: Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --ignore-scripts

        # Download allure results from nightly workflow
      - name: 📥 Download Allure results artifact
        uses: actions/download-artifact@v4
        with:
          name: nightly-chromium-results
          path: allure-results
        continue-on-error: true

        # Install Allure CLI
      - name: 🔧 Install Allure CLI
        run: npm install -g allure-commandline

        # Generate Allure HTML report
      - name: 📊 Generate Allure report
        run: allure generate allure-results --clean -o allure-report

        # Publish to GitHub Pages
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./aalure-report
          publish_branch: gh-pages
          commit_message: "does: publish allure report"
