name: 🔄 Regression Suite

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run tests on"
        required: false
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  regression:
    name: Regression - ${{ github.event.inputs.browser || 'chromium' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # Node.js
      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # Playwright browsers
      - name: 🌐 Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Lint
      - name: 🔍 Run ESLint
        run: npm run lint

      # Type check
      - name: 🔷 TypeScript type check
        run: npm run type-check

      # Regression tests
      - name: 🧪 Run regression suite
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HEADLESS: true
          WORKERS: 2
          ENVIRONMENT: ci
          CI: true

      # Always upload results
      - name: 📊 Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: 📊 Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-allure-results
          path: allure-results/
          retention-days: 14

      - name: 📸 Upload test results and screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-test-results
          path: test-results/
          retention-days: 14

      # PR comment with results summary
      - name: 💬 Comment PR with test summary
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const conclusion = "${{ job.status }}";
            const emoji = conclusion === "success" ? "✅" : "❌";
            const body = `## ${emoji} Regression Test Results

            **Status:** ${conclusion.toUpperCase()}
            **Branch:** \`${{ github.head_ref }}\`
            **Browser:** \`${{ github.event.inputs.browser || 'chromium' }}\`
            **Run:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            > Download the Playwright report artifact for detailed results.`;

            github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
            });
