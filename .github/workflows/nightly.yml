name: 🌙 Nightly Full Suite

on:
  schedule:
    - cron: "0 7 * * *" # 2 AM EST = 7 AM UTC
  workflow_dispatch: # Manual trigger

env:
  NODE_VERSION: "20"

jobs:
  # Cross-browser matrix
  cross-browser:
    name: Tests — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false # Continue other browsers if one fails
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🌐 Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: 🧪 Run tests on ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HEADLESS: true
          WORKERS: 2
          ENVIRONMENT: ci
          CI: true

      - name: 📊 Upload results — ${{ matrix.browser }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ matrix.browser }}-results
          path: |
            playwright-report/
            allure-results/
            test-results/
          retention-days: 30

  # Accessibility tests
  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🌐 Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: ♿ Run accessibility tests
        run: npm run test:accessibility
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HEADLESS: true
          CI: true

      - name: 📊 Upload accessibility results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-accessibility-results
          path: allure-results/
          retention-days: 30

  # Nightly summary notification
  notify:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: [cross-browser, accessibility]
    if: always()

    steps:
      - name: 📢 Nightly run summary
        run: |
          echo "Nightly run complete"
          echo "Cross-browser: ${{ needs.cross-browser.result }}"
          echo "Accessibility: ${{ needs.accessibility.result }}"
